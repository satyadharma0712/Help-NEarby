<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Telemedicine Portal</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%),
          url("https://images.unsplash.com/photo-1580281657525-3b236b5c1d6f")
            center/cover no-repeat;
        margin: 0;
        padding: 0;
        color: white;
      }
      header {
        text-align: center;
        padding: 20px;
        background: rgba(3, 87, 103, 0.7);
        font-size: 1.8em;
        font-weight: bold;
      }
      .container {
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        padding: 30px;
        gap: 20px;
      }
      .card {
        background: rgba(255, 255, 255, 0.15);
        backdrop-filter: blur(10px);
        padding: 20px;
        border-radius: 15px;
        width: 350px;
        box-shadow: 0 4px 20px rgba(0, 0, 0, 0.4);
      }
      h2 {
        text-align: center;
        margin-bottom: 15px;
        color: #ffd700;
      }
      input,
      select,
      textarea,
      button {
        width: 100%;
        padding: 10px;
        margin: 8px 0;
        border: none;
        border-radius: 8px;
        font-size: 1em;
      }
      input,
      select,
      textarea {
        background-color: rgba(255, 255, 255, 0.9);
        color: #333;
      }
      button {
        background-color: #45a049;
        color: white;
        cursor: pointer;
        font-weight: bold;
        transition: background 0.3s ease;
      }
      button:hover {
        background-color: #3d8b41;
      }
      label {
        font-weight: bold;
        color: white;
        display: block;
        margin-top: 10px;
      }
      input[type="file"] {
        background-color: rgba(255, 255, 255, 0.9);
        padding: 10px;
        border-radius: 8px;
        font-size: 0.9em;
        cursor: pointer;
        color: #333;
      }
      input[type="file"]::-webkit-file-upload-button {
        background-color: #45a049;
        color: white;
        border: none;
        padding: 8px 12px;
        border-radius: 6px;
        cursor: pointer;
        transition: background-color 0.3s ease;
      }
      input[type="file"]::-webkit-file-upload-button:hover {
        background-color: #3d8b41;
      }
      .file-name {
        font-size: 0.85em;
        margin-top: 5px;
        color: #ddd;
      }

      /* Popup */
      .popup {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0, 0, 0, 0.6);
        display: none;
        justify-content: center;
        align-items: center;
        z-index: 1000;
      }
      .popup-content {
        background: white;
        padding: 20px 30px;
        border-radius: 10px;
        text-align: center;
        position: relative;
        width: 350px;
        color: #333;
        box-shadow: 0px 5px 15px rgba(0, 0, 0, 0.3);
      }
      .popup-content h2 {
        margin-bottom: 15px;
        color: #45a049;
      }
      .close-btn {
        position: absolute;
        top: 10px;
        right: 15px;
        font-size: 20px;
        font-weight: bold;
        cursor: pointer;
        color: #555;
      }
      .close-btn:hover {
        color: red;
      }
    </style>
  </head>
  <body>
    <header>Telemedicine Consultation</header>

    <div class="container">
      <!-- Booking Section -->
      <div class="card" id="bookingCard">
        <h2>Book Consultation</h2>
        <form id="bookingForm" method="post" action="">
          {%csrf_token%}
          <input type="text" name="name" placeholder="Your Name" required />
          <input type="tel" name="phone" placeholder="Mobile Number" required />
          <select name="doctor" required>
            <option value="">Select Doctor</option>
            {% for doctor in doctors %}
            <option value="{{ doctor.id }}">
              Dr. {{ doctor.full_name }} ({{ doctor.specialisation }})
            </option>
            {% endfor %}
          </select>
          <!-- <input type="date" required>-->
          <textarea
            placeholder="Reason for Consultation"
            name="reason"
            rows="3"
            required
          ></textarea>

          <!-- <label for="reportUpload">Upload Diagnosis Report (optional)</label>
          <input
            type="file"
            id="reportUpload"
            name="diagnosis_report"
            accept=".jpg,.jpeg,.png,.pdf"
          />
          <div class="file-name" id="fileNameDisplay"></div> -->

          <button type="submit">Book Now</button>
        </form>
      </div>

      <!-- Feedback Section -->
      <!-- <div class="card" id="feedbackCard">
        <h2>Give Feedback</h2>
        <form id="feedbackForm">
          <input type="text" placeholder="Your Name" required />
          <select required>
            <option value="">Name of Doctor</option>
            <option>Dr. A</option>
            <option>Dr. B</option>
            <option>Dr. C</option>
            <option>Dr. D</option>
            <option>Dr. E</option>
          </select>
          <select required>
            <option value="">Rate Doctor</option>
            <option>⭐</option>
            <option>⭐⭐</option>
            <option>⭐⭐⭐</option>
            <option>⭐⭐⭐⭐</option>
            <option>⭐⭐⭐⭐⭐</option>
          </select>
          <textarea placeholder="Your Feedback" rows="3" required></textarea>
          <button type="submit">Submit Feedback</button>
        </form>
      </div> -->
    </div>

    <!-- Popup -->
    <div class="popup" id="popup">
      <div class="popup-content">
        <span class="close-btn" onclick="closePopup()">&times;</span>
        <h2 id="popupTitle"></h2>
        <p id="popupMessage"></p>
      </div>
    </div>

    <script>
      // Show file name when uploaded
      document
        .getElementById("reportUpload")
        .addEventListener("change", function () {
          const fileNameDisplay = document.getElementById("fileNameDisplay");
          if (this.files.length > 0) {
            fileNameDisplay.textContent =
              "Selected file: " + this.files[0].name;
          } else {
            fileNameDisplay.textContent = "";
          }
        });

      // Booking form handler
      /*document.getElementById("bookingForm").addEventListener("submit", function(e){
        e.preventDefault();
        document.getElementById("popupTitle").textContent = "Booked Consultation";
        document.getElementById("popupMessage").textContent = "Wait for the message for confirmation and further details.";
        document.getElementById("popup").style.display = "flex";
        document.getElementById("bookingCard").style.display = "none";
        this.reset();
        document.getElementById("fileNameDisplay").textContent = "";
    });*/

      // Feedback form handler
      document
        .getElementById("feedbackForm")
        .addEventListener("submit", function (e) {
          e.preventDefault();
          document.getElementById("popupTitle").textContent = "Feedback Sent";
          document.getElementById("popupMessage").textContent =
            "Thank you for sharing your feedback.";
          document.getElementById("popup").style.display = "flex";
          document.getElementById("feedbackCard").style.display = "none";
          this.reset();
        });

      // Close popup and show correct form again
      function closePopup() {
        document.getElementById("popup").style.display = "none";
        if (
          document.getElementById("popupTitle").textContent ===
          "Booked Consultation"
        ) {
          document.getElementById("bookingCard").style.display = "block";
        } else {
          document.getElementById("feedbackCard").style.display = "block";
        }
      }
    </script>
  </body>
</html>
