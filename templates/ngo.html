<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NGO Home - Vaidya</title>
<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    body {
        height: 100vh;
        background: url('https://images.unsplash.com/photo-1509099836639-18ba1795216d') no-repeat center center/cover;
        position: relative;
        color: white;
    }

    /* Overlay */
    body::before {
        content: "";
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(20, 20, 20, 0.6);
        z-index: 0;
    }

    /* Navbar */
    nav {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 1rem 2rem;
        background: rgba(102, 126, 234, 0.85);
        backdrop-filter: blur(6px);
        position: relative;
        z-index: 2;
    }

    nav .logo {
        font-size: 1.8rem;
        font-weight: bold;
        letter-spacing: 1px;
    }

    nav ul {
        display: flex;
        list-style: none;
        gap: 1.5rem;
    }

    nav ul li {
        cursor: pointer;
        transition: 0.3s;
        font-weight: 500;
    }

    nav ul li:hover {
        color: #45a049;
    }

    /* Main Content */
    .content {
        position: relative;
        z-index: 2;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        height: calc(100vh - 70px);
        text-align: center;
        padding: 0 2rem;
    }

    .content h1 {
        font-size: 3rem;
        margin-bottom: 1rem;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        animation: fadeIn 1.2s ease-in-out;
    }

    .quote {
        font-size: 1.5rem;
        max-width: 800px;
        margin-bottom: 2rem;
        font-style: italic;
        line-height: 1.5;
        animation: fadeIn 1.8s ease-in-out;
    }

    /* Call to Action Button */
    .cta-btn {
        padding: 0.9rem 2rem;
        font-size: 1.1rem;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        border: none;
        color: white;
        border-radius: 30px;
        cursor: pointer;
        transition: transform 0.3s, background 0.3s;
        animation: fadeIn 2.2s ease-in-out;
    }

    .cta-btn:hover {
        transform: scale(1.05);
        background: linear-gradient(135deg, #3d8f41, #2f7032);
    }

    /* Animation */
    @keyframes fadeIn {
        from {opacity: 0; transform: translateY(20px);}
        to {opacity: 1; transform: translateY(0);}
    }

</style>
</head>
<body>

<nav>
    <div class="logo">Vaidya - NGO</div>
    <ul>
        <a href="createcampaign/"><li>Create Campaign</li></a>
        <a href="overview/"><li>Overview</li></a>
        <a href="ngoMonitor/"><li>Monitor</li></a>
        <a href="../logout"><li>Logout</li></a>
    </ul>
</nav>

<div class="content">
    <h1>Empowering Communities Through Volunteering</h1>
    <p class="quote">"The best way to find yourself is to lose yourself in the service of others." – Mahatma Gandhi</p>
    <a href="createcampaign/"><button class="cta-btn">Start a New Campaign</button></a>
</div>

<script>
    function navigate(page) {
        if(page === 'create') {
            alert("Navigating to Create Campaign page...");
            // window.location.href = 'create_campaign.html';
        } else if(page === 'overview') {
            alert("Navigating to Overview page...");
            // window.location.href = 'overview.html';
        } else if(page === 'logout') {
            alert("Logging out...");
            // window.location.href = 'login.html';
        }
    }
</script>

</body>
</html>
