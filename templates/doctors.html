<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Doctor Homepage - Vaidya</title>
  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)),
                  url('https://plus.unsplash.com/premium_photo-1658506671316-0b293df7c72b?fm=jpg&q=60&w=3000&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxzZWFyY2h8MXx8ZG9jdG9yfGVufDB8fDB8fHww') no-repeat center center/cover;
      color: white;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* Navigation Bar */
    nav {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 1rem 2rem;
      background: linear-gradient(135deg, #667eea48 0%, #764ba283 100%);
    }

    nav .logo {
      font-size: 1.5rem;
      font-weight: bold;
      color: #45a049;
    }

    nav ul {
      list-style: none;
      display: flex;
      gap: 1.5rem;
      margin: 0;
      padding: 0;
    }

    nav ul li {
      position: relative;
    }

    nav ul li a {
      text-decoration: none;
      color: white;
      font-weight: 500;
      transition: color 0.3s;
    }

    nav ul li a:hover {
      color: #45a049;
    }

    /* Main Content */
    .main-content {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      padding: 2rem;
    }

    .main-content h1 {
      font-size: 3rem;
      margin-bottom: 1rem;
    }

    .main-content p {
      font-size: 1.2rem;
      max-width: 700px;
      margin-bottom: 2rem;
      line-height: 1.6;
    }

    .buttons {
      display: flex;
      gap: 1.5rem;
    }

    .buttons button {
      background: linear-gradient(135deg, #3e5ce3 0%, #470e80 100%);
      border: none;
      padding: 0.8rem 1.8rem;
      border-radius: 30px;
      color: white;
      font-size: 1rem;
      font-weight: bold;
      cursor: pointer;
      transition: 0.3s ease;
    }

    .buttons button:hover {
      background: #45a049;
      transform: scale(1.05);
    }

    @media (max-width: 768px) {
      .main-content h1 {
        font-size: 2rem;
      }

      .buttons {
        flex-direction: column;
      }
    }
  </style>
</head>
<body>

  <nav>
    <div class="logo">Vaidya - Doctor</div>
    <ul>
      <li><a href="appointments/">Appointments</a></li>
      <li><a href="checkfeedback/">Check Recent Feedback</a></li>
      <li><a href="reportcrisis/">Report Crisis</a></li>
      <li><a href="../logout">Logout</a></li>
    </ul>
  </nav>

  <div class="main-content">
    <h1>Welcome, Doctor</h1>
    <p>"Healing is a matter of time, but it is sometimes also a matter of opportunity.  
       Thank you for being the opportunity in someone’s life."</p>
    <div class="buttons">
      <a href="appointments/"><button>View Appointments</button></a>
      <a href="checkfeedback/"><button>Check Feedback</button></a>
    </div>
  </div>

</body>
</html>
