<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Citizen Report - Vaidya</title>
<style>
    body {
        font-family: Arial, sans-serif;
        background: linear-gradient(135deg, #667eea, #764ba2);
        margin: 0;
        padding: 0;
        display: flex;
        justify-content: center;
        align-items: flex-start;
        min-height: 100vh;
    }

    .container {
        background: #fff;
        padding: 30px;
        border-radius: 15px;
        box-shadow: 0 8px 15px rgba(0,0,0,0.2);
        width: 90%;
        max-width: 600px;
        margin-top: 40px;
    }

    h2 {
        margin-bottom: 20px;
        color: #333;
        text-align: center;
    }

    label {
        display: block;
        margin-top: 10px;
        text-align: left;
        font-weight: bold;
        color: #444;
    }

    input, textarea, select {
        width: 100%;
        padding: 12px;
        margin-top: 5px;
        border: 1px solid #ccc;
        border-radius: 8px;
        font-size: 1rem;
    }

    button {
        margin-top: 20px;
        padding: 12px;
        width: 100%;
        background: #45a049;
        color: white;
        border: none;
        border-radius: 8px;
        font-size: 1rem;
        font-weight: bold;
        cursor: pointer;
        transition: 0.3s;
    }

    button:hover {
        background: #3d8b3d;
    }

    /* Popup overlay */
    .overlay {
        display: none;
        position: fixed;
        top: 0; left: 0;
        width: 100%; height: 100%;
        background: rgba(0,0,0,0.6);
        justify-content: center;
        align-items: center;
    }

    .popup {
        background: #fff;
        padding: 25px;
        border-radius: 12px;
        box-shadow: 0 8px 15px rgba(0,0,0,0.3);
        text-align: center;
        position: relative;
        max-width: 400px;
    }

    .popup h3 {
        margin-bottom: 10px;
        color: #45a049;
    }

    .close-btn {
        position: absolute;
        top: 8px;
        right: 12px;
        font-size: 22px;
        font-weight: bold;
        color: #444;
        cursor: pointer;
    }

    .close-btn:hover {
        color: red;
    }

    /* Report history section */
    .history {
        margin-top: 30px;
    }

    .report-card {
        background: #f9f9f9;
        border-left: 5px solid #667eea;
        padding: 15px;
        margin-bottom: 15px;
        border-radius: 8px;
        box-shadow: 0 2px 6px rgba(0,0,0,0.1);
    }

    .report-card h4 {
        margin: 0;
        color: #333;
    }

    .report-card p {
        margin: 5px 0;
        font-size: 0.95rem;
        color: #555;
    }
</style>
</head>
<body>

<div class="container">
    <h2>Report an Issue</h2>
    <form id="reportForm" method="post" action="">
        {%csrf_token%}
        <label for="type">Report Type:</label>
        <select id="type" name="report_type" required>
            <option value="">-- Select an option --</option>
            <option value="Illness">Illness</option>
            <option value="Outbreak">Outbreak</option>
            <option value="Mental Health Crisis">Mental Health Crisis</option>
        </select>

        <label for="location">Location:</label>
        <input type="text" id="location" name="location" placeholder="Enter location" required>

        <label for="details">Details:</label>
        <textarea id="details" rows="4" name="details" placeholder="Describe the issue" required></textarea>

        <button type="submit">Submit Report</button>
    </form>

    <!-- Report History -->
    <div class="history" id="history">
        <h3>Reported Issues</h3>
        <div id="reportList"></div>
    </div>
</div>

<!-- Popup Overlay -->
<div class="overlay" id="popupOverlay">
    <div class="popup">
        <span class="close-btn" onclick="closePopup()">&times;</span>
        <h3>Report Sent Successfully</h3>
        <p>NGOs will be informed. Thank you for your contribution.</p>
    </div>
</div>

</html>
