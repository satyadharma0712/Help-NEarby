<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Appointments Overview</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #fff;
            min-height: 100vh;
        }

        nav {
            background: rgba(0, 0, 0, 0.2);
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        nav h1 {
            font-size: 1.5em;
        }

        nav ul {
            list-style: none;
            display: flex;
            gap: 20px;
        }

        nav ul li a {
            text-decoration: none;
            color: #fff;
            font-weight: bold;
            transition: color 0.3s;
        }

        nav ul li a:hover {
            color: #ffeb3b;
        }

        .container {
            padding: 30px;
            max-width: 1000px;
            margin: auto;
        }

        .summary {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 30px;
        }

        .card {
            background: rgba(255, 255, 255, 0.15);
            padding: 20px;
            border-radius: 15px;
            text-align: center;
            width: 200px;
            box-shadow: 0px 4px 10px rgba(0,0,0,0.3);
            transition: transform 0.2s;
        }

        .card:hover {
            transform: translateY(-5px);
        }

        .card h2 {
            font-size: 2.5em;
            margin-bottom: 5px;
            color: #ffeb3b;
        }

        .appointments-table {
            width: 100%;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            overflow: hidden;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
        }

        th, td {
            padding: 15px;
            border-bottom: 1px solid rgba(255,255,255,0.2);
        }

        th {
            background: rgba(0,0,0,0.3);
        }

        tr:hover {
            background: rgba(255,255,255,0.1);
        }
    </style>
</head>
<body>

    

    <div class="container">
        <div class="summary">
            <div class="card">
                <h2>25</h2>
                <p>Total Appointments</p>
            </div>
        </div>

        <div class="appointments-table">
            <table>
                <thead>
                    <tr>
                        <th>Appointment ID</th>
                        <th>Citizen Name</th>
                        <th>Doctor Name</th>
                        <th>Date</th>
                        <th>Time</th>
                        <th>Status</th>
                    </tr>
                </thead>
                <tbody >
                    <tr>
                        <td>#A001</td>
                        <td>Ravi Kumar</td>
                        <td>Dr. Meena Sharma</td>
                        <td>2025-08-20</td>
                        <td>10:00 AM</td>
                        <td>Pending</td>
                    </tr>
                    <tr>
                        <td>#A002</td>
                        <td>Priya Singh</td>
                        <td>Dr. Rahul Verma</td>
                        <td>2025-08-21</td>
                        <td>2:00 PM</td>
                        <td>Completed</td>
                    </tr>
                    <tr>
                        <td>#A003</td>
                        <td>Amit Joshi</td>
                        <td>Dr. Sneha Kapoor</td>
                        <td>2025-08-22</td>
                        <td>11:00 AM</td>
                        <td>Pending</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

</body>
</html>
